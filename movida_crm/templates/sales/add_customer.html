{% extends 'base.html' %}
{% block title %}إضافة عميل{% endblock %}
{% block page_title %}إضافة عميل جديد{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-header d-flex align-items-center gap-2">
                <i class="bi bi-person-plus" style="color:#2563EB;font-size:1.2rem;"></i>
                <h6 class="mb-0 fw-bold">بيانات العميل</h6>
                {% if from_social %}<span class="badge bg-info ms-2">من السوشيال ميديا</span>{% endif %}
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('sales.add_customer') }}">
                    <input type="hidden" name="social_number_id" value="{{ social_id or '' }}">

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">رقم الهاتف <span class="text-danger">*</span></label>
                            <input type="text" name="phone" class="form-control" value="{{ phone or '' }}"
                                   {{ 'readonly' if from_social else '' }} required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">اسم العميل <span class="text-danger">*</span></label>
                            <input type="text" name="full_name" class="form-control" placeholder="الاسم الكامل" required>
                        </div>

                        {% if not from_social %}
                        <div class="col-12">
                            <label class="form-label">مصدر العميل <span class="text-danger">*</span></label>
                            <div class="d-flex gap-3 flex-wrap">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="source" id="src_reception" value="reception" checked onchange="toggleSource()">
                                    <label class="form-check-label" for="src_reception">استقبال</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="source" id="src_social" value="social" onchange="toggleSource()">
                                    <label class="form-check-label" for="src_social">سوشيال ميديا</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="source" id="src_other" value="other" onchange="toggleSource()">
                                    <label class="form-check-label" for="src_other">مصدر آخر</label>
                                </div>
                            </div>
                            <input type="text" name="source_detail" id="source_detail" class="form-control mt-2 d-none" placeholder="اذكر المصدر">
                        </div>
                        {% endif %}

                        <!-- Countries -->
                        <div class="col-12">
                            <label class="form-label">الدول المطلوبة</label>
                            <div id="countries-container">
                                <div class="d-flex gap-2 mb-2">
                                    <input type="text" name="countries" class="form-control" placeholder="أدخل دولة">
                                    <button type="button" class="btn btn-outline-success btn-sm" onclick="addCountry()">
                                        <i class="bi bi-plus"></i>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">كشف حساب بنكي</label>
                            <select name="has_bank_statement" class="form-select">
                                <option value="no">لا</option>
                                <option value="yes">نعم</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">الاهتمام</label>
                            <select name="interest_level" class="form-select" id="interestSelect" onchange="toggleInterest()">
                                <option value="">غير محدد</option>
                                <option value="interested">مهتم</option>
                                <option value="not_interested">غير مهتم</option>
                            </select>
                        </div>

                        <div class="col-md-6 d-none" id="interest_pct_div">
                            <label class="form-label">نسبة الاهتمام (%)</label>
                            <input type="number" name="interest_percentage" class="form-control" min="0" max="100" placeholder="0-100">
                        </div>

                        <div class="col-12 d-none" id="not_interested_div">
                            <label class="form-label">سبب عدم الاهتمام</label>
                            <input type="text" name="not_interested_reason" class="form-control" placeholder="اذكر السبب">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">موعد المقابلة <small class="text-muted">(اختياري)</small></label>
                            <input type="datetime-local" name="interview_date" class="form-control">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">موعد المتابعة <small class="text-muted">(اختياري)</small></label>
                            <input type="datetime-local" name="followup_date" class="form-control">
                        </div>

                        <div class="col-12">
                            <label class="form-label">ملاحظات <small class="text-muted">(اختياري)</small></label>
                            <textarea name="notes" class="form-control" rows="3" placeholder="أي ملاحظات إضافية..."></textarea>
                        </div>
                    </div>

                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg me-1"></i>حفظ العميل
                        </button>
                        <a href="{{ url_for('sales.home') }}" class="btn btn-outline-secondary">إلغاء</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function addCountry() {
    const container = document.getElementById('countries-container');
    const div = document.createElement('div');
    div.className = 'd-flex gap-2 mb-2';
    div.innerHTML = `<input type="text" name="countries" class="form-control" placeholder="أدخل دولة">
        <button type="button" class="btn btn-outline-danger btn-sm" onclick="this.parentElement.remove()"><i class="bi bi-trash"></i></button>`;
    container.appendChild(div);
}
function toggleInterest() {
    const val = document.getElementById('interestSelect').value;
    document.getElementById('interest_pct_div').classList.toggle('d-none', val !== 'interested');
    document.getElementById('not_interested_div').classList.toggle('d-none', val !== 'not_interested');
}
function toggleSource() {
    const other = document.getElementById('src_other');
    document.getElementById('source_detail').classList.toggle('d-none', !other || !other.checked);
}
</script>
{% endblock %}
