{% extends 'base.html' %}
{% block title %}تعديل موعد المقابلة{% endblock %}
{% block page_title %}تعديل موعد المقابلة{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-header d-flex align-items-center justify-content-between">
                <h6 class="mb-0 fw-bold">تعديل موعد المقابلة</h6>
                <a href="{{ url_for('sales.customer_profile', customer_id=interview.customer.id) }}" class="btn btn-outline-secondary btn-sm">رجوع</a>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('sales.edit_interview', interview_id=interview.id) }}">
                    <div class="mb-3">
                        <label class="form-label">تاريخ ووقت المقابلة</label>
                        <input type="datetime-local" name="interview_date" class="form-control" value="{{ interview.interview_date.strftime('%Y-%m-%dT%H:%M') if interview.interview_date else '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">ملاحظات</label>
                        <textarea name="notes" class="form-control" rows="4">{{ interview.notes or '' }}</textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">حفظ التعديل</button>
                        <a href="{{ url_for('sales.customer_profile', customer_id=interview.customer.id) }}" class="btn btn-outline-secondary">إلغاء</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
