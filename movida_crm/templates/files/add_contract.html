{% extends 'base.html' %}
{% block title %}إضافة تعاقد{% endblock %}
{% block page_title %}إضافة تعاقد جديد{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-9">
        <div class="card">
            <div class="card-header d-flex align-items-center gap-2">
                <i class="bi bi-file-earmark-plus" style="color:#10B981;font-size:1.2rem;"></i>
                <h6 class="mb-0 fw-bold">بيانات التعاقد الجديد</h6>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('files.add_contract') }}" enctype="multipart/form-data">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">رقم الهاتف <span class="text-danger">*</span></label>
                            <input type="text" name="phone" class="form-control" placeholder="رقم هاتف العميل" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">اسم العميل <span class="text-danger">*</span></label>
                            <input type="text" name="client_name" class="form-control" placeholder="الاسم الكامل" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">الدولة <span class="text-danger">*</span></label>
                            <input type="text" name="country" class="form-control" placeholder="الدولة المطلوبة" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">تكلفة المعاملة <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <input type="number" name="total_cost" class="form-control" placeholder="0.00" step="0.01" min="0" required>
                                <span class="input-group-text">ج.م</span>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">عدد الدفعات</label>
                            <input type="number" name="num_payments" class="form-control" value="1" min="1">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">مكان التبصيم</label>
                            <input type="hidden" name="fingerprint_location" id="fingerprintLocationInput" value="">
                            <select id="fingerprintProviderSelect" class="form-select">
                                <option value="">اختر جهة التبصيم</option>
                                <option value="BLS">BLS</option>
                                <option value="VFS GLOBAL">VFS GLOBAL</option>
                                <option value="TLS CONTACT">TLS CONTACT</option>
                                <option value="ALMA VIVA">ALMA VIVA</option>
                                <option value="أخرى">أخرى</option>
                            </select>
                        </div>
                        <div class="col-md-6" id="fingerprintOtherGroup" style="display:none;">
                            <label class="form-label">اكتب المكان</label>
                            <input type="text" id="fingerprintOtherInput" class="form-control" placeholder="اكتب المكان">
                        </div>
                        <div class="col-md-6" id="fingerprintCityGroup" style="display:none;">
                            <label class="form-label">المدينة</label>
                            <select id="fingerprintCitySelect" class="form-select">
                                <option value="">اختر المدينة</option>
                                <option value="القاهره">القاهره</option>
                                <option value="الاسكندريه">الاسكندريه</option>
                                <option value="الغردقه">الغردقه</option>
                            </select>
                        </div>
                        <div class="col-md-6" id="fingerprintAreaGroup" style="display:none;">
                            <label class="form-label">المنطقة</label>
                            <select id="fingerprintAreaSelect" class="form-select">
                                <option value="">اختر المنطقة</option>
                                <option value="الشيخ زايد">الشيخ زايد</option>
                                <option value="التجمع">التجمع</option>
                                <option value="الجيزه">الجيزه</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">موعد التبصيم</label>
                            <input type="datetime-local" name="fingerprint_date" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">اختر موظف السيلز <span class="text-danger">*</span></label>
                            <select name="sales_employee_id" class="form-select" required>
                                <option value="">-- اختر موظف السيلز --</option>
                                {% for s in sales_users %}
                                <option value="{{ s.id }}">{{ s.full_name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">صورة العميل <small class="text-muted">(اختياري)</small></label>
                            <input type="file" name="client_image" class="form-control" accept="image/*">
                        </div>
                        <div class="col-12">
                            <label class="form-label">ملاحظات</label>
                            <textarea name="notes" class="form-control" rows="3" placeholder="أي ملاحظات إضافية..."></textarea>
                        </div>
                    </div>
                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-success fw-bold">
                            <i class="bi bi-file-earmark-check me-1"></i>إنشاء الملف
                        </button>
                        <a href="{{ url_for('files.home') }}" class="btn btn-outline-secondary">إلغاء</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script>
    const providerSelect = document.getElementById('fingerprintProviderSelect');
    const cityGroup = document.getElementById('fingerprintCityGroup');
    const citySelect = document.getElementById('fingerprintCitySelect');
    const areaGroup = document.getElementById('fingerprintAreaGroup');
    const areaSelect = document.getElementById('fingerprintAreaSelect');
    const otherGroup = document.getElementById('fingerprintOtherGroup');
    const otherInput = document.getElementById('fingerprintOtherInput');
    const locationInput = document.getElementById('fingerprintLocationInput');

    function updateFingerprintLocation() {
        const provider = providerSelect.value;
        const city = citySelect.value;
        const area = areaSelect.value;
        const other = otherInput.value.trim();
        let parts = [];
        if (provider) {
            if (provider === 'أخرى') {
                parts.push(provider);
                if (other) {
                    parts.push(other);
                }
            } else {
                parts.push(provider);
                if (city) {
                    parts.push(city);
                    if (city === 'القاهره' && area) {
                        parts.push(area);
                    }
                }
            }
        }
        locationInput.value = parts.join(' - ');
    }

    providerSelect.addEventListener('change', function() {
        const value = this.value;
        const isOther = value === 'أخرى';
        otherGroup.style.display = isOther ? 'block' : 'none';
        cityGroup.style.display = !isOther && value ? 'block' : 'none';
        citySelect.value = '';
        areaSelect.value = '';
        areaGroup.style.display = 'none';
        if (!isOther) {
            otherInput.value = '';
        }
        updateFingerprintLocation();
    });

    citySelect.addEventListener('change', function() {
        if (this.value === 'القاهره') {
            areaGroup.style.display = 'block';
        } else {
            areaGroup.style.display = 'none';
            areaSelect.value = '';
        }
        updateFingerprintLocation();
    });

    areaSelect.addEventListener('change', updateFingerprintLocation);
    otherInput.addEventListener('input', updateFingerprintLocation);
</script>
{% endblock %}
