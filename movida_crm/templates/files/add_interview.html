{% extends 'base.html' %}
{% block title %}تسجيل حضور مقابلة{% endblock %}
{% block page_title %}تسجيل حضور مقابلة{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card">
            <div class="card-header d-flex align-items-center gap-2">
                <i class="bi bi-calendar-plus" style="color:#F59E0B;font-size:1.2rem;"></i>
                <h6 class="mb-0 fw-bold">تسجيل حضور المقابلة</h6>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('files.add_interview') }}">
                    <input type="hidden" name="customer_id" value="{{ prefill.customer_id if prefill.customer_id is defined else '' }}">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">رقم الهاتف <span class="text-danger">*</span></label>
                            <input type="text" name="phone" class="form-control" placeholder="رقم هاتف العميل" value="{{ prefill.phone if prefill.phone is defined else '' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">اسم العميل <span class="text-danger">*</span></label>
                            <input type="text" name="client_name" class="form-control" placeholder="اسم العميل الكامل" value="{{ prefill.client_name if prefill.client_name is defined else '' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">الدولة</label>
                            <input type="text" name="country" class="form-control" placeholder="الدولة المطلوبة">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">اختر موظف السيلز</label>
                            <select name="sales_employee_id" class="form-select">
                                <option value="">-- غير محدد --</option>
                                {% for s in sales_users %}
                                <option value="{{ s.id }}" {% if prefill.sales_employee_id is defined and prefill.sales_employee_id == s.id|string %}selected{% endif %}>{{ s.full_name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">تاريخ ووقت حضور المقابلة <span class="text-danger">*</span></label>
                            <input type="datetime-local" name="interview_date" class="form-control" value="{{ prefill.interview_date if prefill.interview_date is defined else '' }}" required>
                            <div class="form-text">سجل تاريخ حضور المقابلة هنا؛ هذا ليس لحجز موعد جديد.</div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">ملاحظات</label>
                            <input type="text" name="notes" class="form-control" placeholder="ملاحظات إضافية">
                        </div>
                    </div>
                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-warning text-dark fw-bold">
                            <i class="bi bi-calendar-check me-1"></i>حفظ المقابلة
                        </button>
                        <a href="{{ url_for('files.home') }}" class="btn btn-outline-secondary">إلغاء</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
