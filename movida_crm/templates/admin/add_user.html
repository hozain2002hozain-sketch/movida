{% extends 'base.html' %}
{% block title %}إضافة مستخدم{% endblock %}
{% block page_title %}إضافة مستخدم جديد{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-header d-flex align-items-center gap-2">
                <i class="bi bi-person-plus" style="color:#2563EB;font-size:1.2rem;"></i>
                <h6 class="mb-0 fw-bold">بيانات المستخدم الجديد</h6>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('admin.add_user') }}">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label">الاسم الكامل <span class="text-danger">*</span></label>
                            <input type="text" name="full_name" class="form-control" placeholder="اسم الموظف" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">اسم المستخدم <span class="text-danger">*</span></label>
                            <input type="text" name="username" class="form-control" placeholder="username" required dir="ltr">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">كلمة المرور <span class="text-danger">*</span></label>
                            <input type="password" name="password" class="form-control" placeholder="••••••••" required dir="ltr">
                        </div>
                        <div class="col-12">
                            <label class="form-label">القسم <span class="text-danger">*</span></label>
                            <select name="role" class="form-select" required>
                                <option value="">اختر القسم</option>
                                <option value="admin">مدير</option>
                                <option value="sales">موظف مبيعات</option>
                                <option value="social">موظف سوشيال ميديا</option>
                                <option value="files">موظف ملفات</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">البريد الإلكتروني <small class="text-muted">(اختياري)</small></label>
                            <input type="email" name="email" class="form-control" placeholder="email@example.com" dir="ltr">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">رقم الهاتف <small class="text-muted">(اختياري)</small></label>
                            <input type="text" name="phone" class="form-control" placeholder="رقم الهاتف">
                        </div>
                    </div>
                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>إضافة المستخدم</button>
                        <a href="{{ url_for('admin.users') }}" class="btn btn-outline-secondary">إلغاء</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
