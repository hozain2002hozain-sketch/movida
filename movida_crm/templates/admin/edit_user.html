{% extends 'base.html' %}
{% block title %}تعديل مستخدم{% endblock %}
{% block page_title %}تعديل بيانات المستخدم{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-header d-flex align-items-center gap-2">
                <i class="bi bi-pencil-square" style="color:#F59E0B;font-size:1.2rem;"></i>
                <h6 class="mb-0 fw-bold">تعديل: {{ user.full_name }}</h6>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('admin.edit_user', user_id=user.id) }}">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label">الاسم الكامل <span class="text-danger">*</span></label>
                            <input type="text" name="full_name" class="form-control" value="{{ user.full_name }}" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label">القسم <span class="text-danger">*</span></label>
                            <select name="role" class="form-select" required>
                                <option value="admin" {{ 'selected' if user.role == 'admin' else '' }}>مدير</option>
                                <option value="sales" {{ 'selected' if user.role == 'sales' else '' }}>موظف مبيعات</option>
                                <option value="social" {{ 'selected' if user.role == 'social' else '' }}>موظف سوشيال ميديا</option>
                                <option value="files" {{ 'selected' if user.role == 'files' else '' }}>موظف ملفات</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">البريد الإلكتروني</label>
                            <input type="email" name="email" class="form-control" value="{{ user.email or '' }}" dir="ltr">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">رقم الهاتف</label>
                            <input type="text" name="phone" class="form-control" value="{{ user.phone or '' }}">
                        </div>
                        <div class="col-12">
                            <label class="form-label">كلمة المرور الجديدة <small class="text-muted">(اتركها فارغة إذا لم تريد التغيير)</small></label>
                            <input type="password" name="password" class="form-control" placeholder="••••••••" dir="ltr">
                        </div>
                    </div>
                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-warning text-dark fw-bold"><i class="bi bi-check-lg me-1"></i>حفظ التغييرات</button>
                        <a href="{{ url_for('admin.users') }}" class="btn btn-outline-secondary">إلغاء</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
